<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SERP Telemetry Inspector</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12a7 7 0 0 1 7-7"/>
      <path d="M5 12a7 7 0 0 0 7 7" opacity="0"/>
      <path d="M3 12a9 9 0 0 1 9-9"/>
      <path d="M12 12h.01"/>
      <circle cx="12" cy="12" r="1.5" fill="#fff" stroke="none"/>
    </svg>
  </div>
  <div class="hdr-text">
    <div class="hdr-title">Telemetry Inspector</div>
    <div class="hdr-sub">gen_204 · client_204 · log</div>
  </div>
  <div class="live"><span class="ldot"></span>Live</div>
</div>

<div class="stats">
  <div class="stat c"><div class="stat-n" id="sc">0</div><div class="stat-l">Clicks (C)</div></div>
  <div class="stat a"><div class="stat-n" id="sp">0</div><div class="stat-l">Attention (A)</div></div>
  <div class="stat s"><div class="stat-n" id="sa">0</div><div class="stat-l">Satisfaction (S)</div></div>
  <div class="stat t"><div class="stat-n" id="st">0</div><div class="stat-l">Total</div></div>
</div>

<div class="toolbar">
  <button class="fb on" data-f="all">All</button>
  <button class="fb" data-f="cas_c">C</button>
  <button class="fb" data-f="cas_a">A</button>
  <button class="fb" data-f="cas_s">S</button>
  <button class="fb" data-f="click">Clicks</button>
  <button class="fb" data-f="pogo">Pogo</button>
  <button class="fb" data-f="ai_overview">AIO</button>
  <button class="fb" data-f="ai_mode">AI Mode</button>
  <button class="fb" data-f="keyboard">Keyboard</button>
  <button class="fb" data-f="gesture">Gesture</button>
  <button class="fb" data-f="perf">Perf</button>
  <div class="sp"></div>
  <button class="ab" id="bex" title="Export JSON">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
  <button class="ab d" id="bcl" title="Clear all">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    Clear
  </button>
</div>

<div class="list" id="list">
  <div class="empty" id="emp">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 4.9a16 16 0 0 0 0 14.2"/><path d="M19.1 4.9a16 16 0 0 1 0 14.2"/><path d="M7.8 7.8a10 10 0 0 0 0 8.4"/><path d="M16.2 7.8a10 10 0 0 1 0 8.4"/><circle cx="12" cy="12" r="2"/></svg>
    </div>
    <div class="msg">No signals captured yet</div>
    <div class="sub">Open Google Search in another tab and start browsing. Signals appear here instantly.</div>
    <div class="hint">Search → click a result → press back</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
